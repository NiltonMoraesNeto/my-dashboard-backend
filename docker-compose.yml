services:
  postgres:
    image: postgres:16-alpine
    container_name: my-dashboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydashboard
      POSTGRES_USER: mydashboard
      POSTGRES_PASSWORD: mydashboard
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mydashboard -d mydashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
